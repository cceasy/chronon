#
# Default Spark logging for Chronon Spark images.
#
# Spark initializes logging before Chronon code can call SparkContext.setLogLevel,
# so keep noisy Spark internals quiet at image startup time.
#

rootLogger.level = info
rootLogger.appenderRef.stdout.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex

loggers = chronon, spark, sparkRpcInbox, sparkproject, hadoop, hadoopHive, jetty, parquet, snowflake, azure, hiveClient

logger.chronon.name = ai.chronon
logger.chronon.level = info

logger.spark.name = org.apache.spark
logger.spark.level = warn

logger.sparkRpcInbox.name = org.apache.spark.rpc.netty.Inbox
logger.sparkRpcInbox.level = off

logger.sparkproject.name = org.sparkproject
logger.sparkproject.level = warn

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = warn

logger.hadoopHive.name = org.apache.hadoop.hive
logger.hadoopHive.level = warn

logger.jetty.name = org.sparkproject.jetty
logger.jetty.level = warn

logger.parquet.name = org.apache.parquet
logger.parquet.level = warn

logger.snowflake.name = net.snowflake
logger.snowflake.level = info

logger.azure.name = com.azure
logger.azure.level = warn

logger.hiveClient.name = org.apache.spark.sql.hive.client.HiveClientImpl
logger.hiveClient.level = warn
